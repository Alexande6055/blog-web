<div class="bg-surface rounded-pushak border p-4 shadow-sm">
  <div class="flex items-center justify-between mb-4">
    <h3 class="font-bold text-secondary">Seleccionar Sucursal</h3>
    <button
      type="button"
      onclick="
        document
          .getElementById('modal-nueva-sucursal')
          .classList.remove('hidden')
      "
      class="text-xs bg-primary text-white px-3 py-1 rounded-md hover:bg-primary/90"
    >
      + Nueva Sucursal
    </button>
  </div>

  <div class="overflow-x-auto max-h-48 overflow-y-auto border rounded-md">
    <table class="w-full text-left text-sm">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="py-2 px-3">ID</th>
          <th class="py-2 px-3">Nombre</th>
          <th class="py-2 px-3 text-right">Acción</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        {% for sucursal in lista_sucursales %}
        <tr class="hover:bg-gray-50">
          <td class="py-2 px-3 font-mono text-xs">#{{ sucursal.id }}</td>
          <td class="py-2 px-3">{{ sucursal.nombre }}</td>
          <td class="py-2 px-3 text-right">
            <button
              type="button"
              onclick="seleccionarSucursal('{{ sucursal.id }}', '{{ sucursal.nombre }}')"
              class="text-primary font-bold hover:underline"
            >
              Seleccionar
            </button>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="3" class="p-4 text-center text-gray-400">
            No hay sucursales.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
