<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página no encontrada</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <main class="flex items-center justify-center min-h-screen px-4">
      <section
        class="bg-white rounded-xl shadow-lg p-10 max-w-md w-full flex flex-col items-center text-center gap-4"
      >
        <h1
          class="font-sans text-4xl md:text-5xl font-bold text-blue-600 drop-shadow-sm"
        >
          ¡Ups! Has perdido 😢
        </h1>

        <p class="font-sans text-gray-600 text-lg max-w-sm">
          No te preocupes, puedes volver al inicio.
        </p>

        <div class="text-blue-400 animate-bounce">
          <!-- Icono de casa SVG (puedes cambiarlo por un emoji si prefieres) -->

            xmlns="http://www.w3.org/2000/svg"
            width="64"
            height="64"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-home"
          >
            <path
              d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H5a2 2 0 0 1-2-2z"
            />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </div>

        <div class="flex gap-4 mt-4 flex-wrap justify-center">
          <a
            href="/"
            class="flex items-center gap-2 bg-blue-600 text-white font-sans font-semibold py-2 px-5 rounded-lg transition-all hover:scale-105 hover:bg-blue-700"
          >
            <!-- Ícono pequeño para el botón -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-home"
            >
              <path
                d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H5a2 2 0 0 1-2-2z"
              />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Volver al inicio
          </a>
        </div>
      </section>
