<div class="relative mt-6" x-data="{ isVisibleOptions: false }">
    <div x-show="isVisibleOptions" x-transition @click.away="isVisibleOptions = false"
        class="absolute right-0 bottom-14 w-40 bg-[var(--color-surface)] shadow-lg rounded-[var(--radius-card)] py-2 z-50"
        style="display: none;">
        <a href="{% url 'admin:index' %}"
            class="block w-full text-left px-4 py-2 font-[var(--font-body)] text-[var(--color-secondary)] hover:bg-[var(--color-primary-light)]">
            Perfil
        </a>

        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit"
                class="block w-full text-left px-4 py-2 font-[var(--font-body)] text-[var(--color-secondary)] hover:bg-[var(--color-primary-light)]">
                Logout
            </button>
        </form>
    </div>

    <button @click="isVisibleOptions = !isVisibleOptions" class="w-full flex items-center gap-3 bg-[var(--color-primary)] text-white font-[var(--font-body)] font-semibold
        py-2 px-4 rounded-[var(--radius-pushak)] transition-all hover:scale-105 hover:bg-[var(--color-primary-light)]
        hover:text-[var(--color-primary)]">
        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="text-[var(--color-primary)]">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>

        <div class="flex flex-col items-start leading-tight">
            <span>{{ user.get_full_name|default:user.username }}</span>
            <span class="text-xs opacity-80">
                {% if user.is_superuser %}Administrador{% else %}Usuario{% endif %}
            </span>
        </div>
    </button>
</div>
