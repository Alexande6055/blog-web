

    <form
      action="{% url 'crear_departamento' %}"
      method="POST"
      class="flex flex-col gap-3"
    >
      {% csrf_token %}
      <input
        type="text"
        name="nombre"
        placeholder="Nombre (Ej: Jerencia)"
        required
        class="border p-2 rounded-md"
      />
      <input
        type="text"
        name="descripcion"
        placeholder="Descripción"
        required
        class="border p-2 rounded-md"
      />
      <div class="flex justify-end gap-2 mt-2">
        <button
          type="button"
          onclick="
            document
              .getElementById('modal-nuevo-departamento')
              .classList.add('hidden')
          "
          class="px-3 py-1.5 text-sm bg-gray-100 rounded"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="px-4 py-1.5 text-sm bg-secondary text-white rounded font-bold"
        >
          Guardar Sucursal
        </button>
      </div>
    </form>
