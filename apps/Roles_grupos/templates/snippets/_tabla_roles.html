<div id="contenedor-tabla-roles" class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
        <tbody class="bg-white divide-y divide-gray-200">
            {% for rol in roles %}
            <tr>
                <td class="px-6 py-4 text-sm text-gray-900 font-medium">{{ rol.name }}</td>
                <td class="px-6 py-4 text-sm text-right">
                    <button type="button"
                            hx-get="{% url 'rol_formulario_edit' rol.id %}"
                            hx-target="#dinamico-form-content"
                            hx-swap="innerHTML"
                            onclick="document.getElementById('contenedor-formulario').classList.remove('hidden')"
                            class="text-primary hover:text-orange-700 font-semibold mr-4 transition-colors">
                        Editar
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
