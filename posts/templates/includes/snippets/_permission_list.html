<div class="flex flex-col h-[400px]">

    <input type="text" 
           class="search-input mb-2 w-full px-3 py-2 border border-gray-300 rounded-pushak outline-none text-sm focus:ring-2 focus:ring-primary"
           data-list="{{ list_key }}"
           placeholder="Buscar...">
    
    <div class="flex-1 border border-gray-200 rounded-pushak overflow-y-auto bg-gray-50 select-none custom-scrollbar"
         data-list-container="{{ list_key }}">

    </div>
</div>
