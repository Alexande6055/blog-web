<form id="grupo-form" method="post" class="space-y-6">
    {% csrf_token %}
    
    <div class="flex items-center justify-between border-b pb-3">
        <h3 class="text-xl font-extrabold text-secondary flex items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            {{ rol_a_editar|yesno:"Editar Rol existente,Configurar Nuevo Rol" }}
        </h3>
        <span class="text-xs font-medium px-2 py-1 bg-gray-100 text-gray-500 rounded-full uppercase tracking-widest">Seguridad</span>
    </div>

    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
        <label for="nombre_input" class="block text-sm font-bold text-gray-700 mb-1 uppercase tracking-tight">Nombre del Rol</label>
        <input type="text" id="nombre_input" name="nombre" required
               value="{{ rol_a_editar.name|default:'' }}"
               placeholder="Ej: Administrador de Ventas"
               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary focus:bg-white outline-none transition-all">
    </div>

    <div x-data="permissionManager({ 
            initialAvailable: {{ permisos_disponibles|safe }},
            initialAssigned: {{ rol_a_editar.permissions|default:'[]'|safe }}
        })" 
        class="space-y-4"
        >
        
        <input type="hidden" name="permissions" :value="JSON.stringify(assigned.map(p => p.id))">

        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-center">
            
            <div class="flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <div class="p-3 bg-gray-50 border-b flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-600 uppercase">Disponibles</span>
                    <span class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full" x-text="filteredLeft.length"></span>
                </div>
                <div class="p-2">
                    <input type="text" x-model="searchLeft" placeholder="Buscar permiso..." 
                           class="w-full p-2 text-sm bg-gray-100 border-none rounded-md focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div class="h-72 overflow-y-auto custom-scrollbar">
                    <template x-for="(perm, index) in filteredLeft" :key="perm.id">
                        <div @click="toggleSelection($event, perm.id, 'left', index)"
                             :class="isSelected(perm.id, 'left') ? 'bg-orange-500 text-white shadow-inner' : 'hover:bg-orange-50 text-gray-700 border-transparent'"
                             class="px-4 py-2.5 cursor-pointer text-sm border-b border-gray-50 transition-all flex items-center justify-between group"
                             x-text="perm.name">
                        </div>
                    </template>
                </div>
            </div>

            <div class="flex md:flex-col gap-3 justify-center items-center">
                <button @click="moveRight" type="button" 
                        class="p-3 bg-primary text-white rounded-xl shadow-lg hover:shadow-orange-200 hover:-translate-y-0.5 active:translate-y-0 transition-all disabled:opacity-20 disabled:grayscale"
                        :disabled="selectedLeft.length === 0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
                <button @click="moveLeft" type="button" 
                        class="p-3 bg-gray-800 text-white rounded-xl shadow-lg hover:shadow-gray-300 hover:-translate-y-0.5 active:translate-y-0 transition-all disabled:opacity-20 disabled:grayscale"
                        :disabled="selectedRight.length === 0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
                </button>
            </div>

            <div class="flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <div class="p-3 bg-secondary text-white flex justify-between items-center">
                    <span class="text-xs font-bold uppercase">Asignados al Rol</span>
                    <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full" x-text="filteredRight.length"></span>
                </div>
                <div class="p-2">
                    <input type="text" x-model="searchRight" placeholder="Buscar asignado..." 
                           class="w-full p-2 text-sm bg-gray-50 border-none rounded-md focus:ring-1 focus:ring-secondary outline-none">
                </div>
                <div class="h-72 overflow-y-auto custom-scrollbar">
                    <template x-for="(perm, index) in filteredRight" :key="perm.id">
                        <div @click="toggleSelection($event, perm.id, 'right', index)"
                             :class="isSelected(perm.id, 'right') ? 'bg-secondary text-white' : 'hover:bg-blue-50 text-gray-700'"
                             class="px-4 py-2.5 cursor-pointer text-sm border-b border-gray-50 transition-all"
                             x-text="perm.name">
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <div class="flex items-center justify-end gap-4 pt-6 mt-4 border-t border-gray-100">
        <a href="{% url 'home' %}" class="text-sm font-bold text-gray-400 hover:text-gray-600 transition-colors">
            Descartar cambios
        </a>
        <button type="submit" 
                class="bg-primary text-white px-10 py-3 rounded-lg font-bold shadow-xl shadow-orange-200 hover:bg-orange-600 transform hover:-translate-y-1 transition-all active:scale-95">
            {{ rol_a_editar|yesno:"Guardar Cambios,Crear Grupo Ahora" }}
        </button>
    </div>
</form>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
</style>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('permissionManager', (config) => ({
            available: Array.isArray(config.initialAvailable) ? config.initialAvailable : [],
            assigned: Array.isArray(config.initialAssigned) ? config.initialAssigned : [],
            searchLeft: '',
            searchRight: '',
            selectedLeft: [],
            selectedRight: [],

            get filteredLeft() {
                return this.available.filter(p => p.name.toLowerCase().includes(this.searchLeft.toLowerCase()));
            },
            get filteredRight() {
                return this.assigned.filter(p => p.name.toLowerCase().includes(this.searchRight.toLowerCase()));
            },

            isSelected(id, side) {
                return side === 'left' ? this.selectedLeft.includes(id) : this.selectedRight.includes(id);
            },

            toggleSelection(event, id, side, index) {
                let target = side === 'left' ? this.selectedLeft : this.selectedRight;
                const pos = target.indexOf(id);
                if (pos > -1) target.splice(pos, 1);
                else target.push(id);
            },

            moveRight() {
                const toMove = this.available.filter(p => this.selectedLeft.includes(p.id));
                this.assigned = [...this.assigned, ...toMove];
                this.available = this.available.filter(p => !this.selectedLeft.includes(p.id));
                this.selectedLeft = [];
            },

            moveLeft() {
                const toMove = this.assigned.filter(p => this.selectedRight.includes(p.id));
                this.available = [...this.available, ...toMove];
                this.assigned = this.assigned.filter(p => !this.selectedRight.includes(p.id));
                this.selectedRight = [];
            }
        }));
    });
</script>
