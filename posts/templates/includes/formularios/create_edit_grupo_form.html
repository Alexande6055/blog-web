<form id="grupo-form"
      hx-post="{% if rol_a_editar %}{% url 'home_edit' rol_a_editar.id %}{% else %}{% url 'home' %}{% endif %}"
      hx-target="#contenedor-tabla-roles"
      hx-swap="innerHTML"
      hx-on::after-request="setTimeout(() => document.getElementById('contenedor-formulario').classList.add('hidden'), 300)"
      class="space-y-6">
    {% csrf_token %}
    
    <div class="mb-4">
        <label class="block text-sm font-bold text-secondary mb-2 uppercase">Nombre del Grupo</label>
        <input type="text" 
               name="nombre" 
               value="{{ rol_a_editar.name|default:'' }}" 
               placeholder="Ej: Administrador" 
               required
               class="w-full px-4 py-2 border border-gray-300 rounded-pushak outline-none text-sm focus:ring-2 focus:ring-primary">
    </div>
    
    <div class="space-y-4" id="permission-manager">
        <input type="hidden" name="permissions" id="permissions-input" value="[]">

        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-center">
            {% include "includes/snippets/_permission_list.html" with list_key="available" label="Permisos Disponibles" %}

            <div class="flex md:flex-col gap-3 justify-center items-center">
                <button id="btn-move-right" type="button" 
                        class="p-3 bg-primary text-white rounded-xl shadow-lg hover:-translate-y-0.5 transition-all disabled:opacity-20"
                        disabled>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
                <button id="btn-move-left" type="button" 
                        class="p-3 bg-gray-800 text-white rounded-xl shadow-lg hover:-translate-y-0.5 transition-all disabled:opacity-20"
                        disabled>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
                </button>
            </div>

            {% include "includes/snippets/_permission_list.html" with list_key="assigned" label="Asignados al Rol" %}
        </div>

        <div class="flex items-center justify-end gap-4 pt-6 mt-4 border-t border-gray-100">
            <button type="button" 
                    onclick="document.getElementById('contenedor-formulario').classList.add('hidden')"
                    class="text-sm font-bold text-gray-400 hover:text-gray-600 transition-colors">
                Descartar cambios
            </button>
            <button type="submit" 
                    class="bg-primary text-white px-10 py-3 rounded-lg font-bold shadow-xl shadow-orange-200 hover:bg-orange-600 transform hover:-translate-y-1 transition-all active:scale-95">
                {{ rol_a_editar|yesno:"Guardar Cambios,Crear Grupo Ahora" }}
            </button>
        </div>
    </div>

</form>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    
    .permission-item.selected {
        background-color: var(--color-primary);
        color: white;
    }
    
    .permission-item:not(.selected):hover {
        background-color: #fed7aa;
    }
</style>

<script>
    // Inicializar el módulo de permisos con los datos del formulario
    if (window.PermissionManager) {
        window.PermissionManager.init({
            available: {{ permisos_disponibles|safe }},
            assigned: {{ rol_a_editar.permissions|default:'[]'|safe }}
        });
    }
</script>
