{% extends 'layouts/base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
    <div class="bg-surface rounded-pushak shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-secondary">ROLES DISPONIBLES</h2>
            <button onclick="document.getElementById('contenedor-formulario').classList.remove('hidden')" 
                    class="bg-primary text-white px-4 py-2 rounded-pushak hover:bg-orange-600 shadow-lg">
                + Crear nuevo rol
            </button>
        </div>

       {% include "includes/snippets/_tabla_roles.html" %}
    </div>
</div>

<div id="contenedor-formulario" 
     class="fixed inset-0 z-50 flex items-center justify-center {% if not rol_a_editar %}hidden{% endif %} bg-black bg-opacity-50 backdrop-blur-sm">
    
    <div class="bg-white w-full max-w-md mx-4 rounded-pushak shadow-2xl p-8 relative">
        <a href="{% url 'home' %}" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
        </a>
        {% include "includes/formularios/create_edit_grupo_form.html" %}

    </div>
</div>
{% endblock %}
